name: VeriClaw Security Scan

on:
  push:
    branches: [main, master, '**']
  pull_request:
    branches: [main, master]

jobs:
  security-scan:
    name: VeriClaw Adversarial Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install VeriClaw
        run: |
          python -m pip install --upgrade pip
          pip install vericlaw

      - name: Run VeriClaw Scan
        run: |
          python -m vericlaw.scan \
            --target . \
            --format sarif \
            --output vericlaw-results.sarif \
            --policy standard
        env:
          VERIFORGE_SECRET_KEY: ${{ secrets.VERIFORGE_SECRET_KEY }}

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: vericlaw-results.sarif
          category: vericlaw-security-scan

      - name: Security Gate
        run: |
          python -m vericlaw.gate \
            --target . \
            --policy standard
        env:
          VERIFORGE_SECRET_KEY: ${{ secrets.VERIFORGE_SECRET_KEY }}

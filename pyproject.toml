[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "veriforge_dsl"
version = "0.5.0"
description = "Formal Specification Language for Python -- property-based testing, contracts, and natural-language-to-code pipelines"
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "VeriForge Contributors", email = "veriforge@example.com"},
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Software Development :: Testing",
    "Topic :: Software Development :: Quality Assurance",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.9"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "black",
    "mypy",
    "ruff",
]

[project.scripts]
veriforge = "veriforge_dsl.__main__:main"

[project.urls]
Homepage = "https://github.com/veriforge/dsl"
Repository = "https://github.com/veriforge/dsl"

[tool.setuptools.packages.find]
where = ["."]
include = ["veriforge_dsl*", "examples*"]

[tool.black]
line-length = 100
target-version = ['py39', 'py310', 'py311']

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[tool.ruff]
line-length = 100
select = ["E", "F", "W", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-v --tb=short"

[tox]
envlist = py310, py311, py312, lint, security
isolated_build = true

[testenv]
deps =
    pytest>=8.0
    pytest-cov>=5.0
    jinja2>=3.1.0
    cryptography>=42.0.0
commands =
    pytest tests/ -v --cov=veriforge --cov-report=term-missing

[testenv:lint]
deps =
    black>=24.0
    mypy>=1.10
commands =
    black --check veriforge/ tests/ examples/
    mypy veriforge/

[testenv:security]
deps =
    bandit[toml]>=1.7
commands =
    bandit -r veriforge/

[testenv:format]
deps =
    black>=24.0
commands =
    black veriforge/ tests/ examples/

[flake8]
max-line-length = 100
exclude = .git,__pycache__,build,dist,.tox,venv
